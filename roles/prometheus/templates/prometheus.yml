---
global:
  external_labels:
    hostname: '{{ hostname }}'
rule_files:
  - '/opt/prometheus/rules.yml'
alerting:
  alertmanagers:
    - path_prefix: '/alertmanager'
      static_configs:
        - targets: ['localhost:9093']
scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
  - job_name: 'firewall'
    static_configs:
      - targets: ['localhost:{{ firewall_api_port }}']
