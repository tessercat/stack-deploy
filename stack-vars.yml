---
# Run modules using the host's Python 3 interpreter.
ansible_python_interpreter: "/usr/bin/python3"

# Change this and smtp_* vars to send admin email to an external address.
# Note that exim4 mail to root goes to the mail user in /var/mail/mail.
admin_email: "root@localhost"

# Limit SSH access to an IPv4 address or CIDR subnet. Optional.
admin_address: ""

# Auth vars for a STARTTLS SMTP service. Optional.
smtp_server: ""
smtp_username: ""
smtp_password: ""

# Optional.
root_password: ""

# Let's Encrypt account email address. Mandatory.
letsencrypt_email: ""

# DNS name with A and AAAA records. Mandatory.
hostname: ""

# Space-separated list of other DNS names. Optional.
other_hostnames: ""

# Tzdata database value.
timezone: "UTC"
